feature_root: /media/k3nwong/Data1/test/outputs/pipeline/anonymized
manifest_dir: /media/k3nwong/Data1/test/outputs/data
output_dir: /media/k3nwong/Data1/test/adodas_baseline/output/a1

feature_selection:
  audio_features:
    - mel_mfcc
    - vad
    - egemaps
    - ssl_embed
  video_features:
    - headpose_geom
    - face_behavior
    - qc_stats
    - vad_agg
    # - body_pose
    # - global_motion
    - vision_ssl_embed
  audio_ssl_model_tag: wav2vec2-chinese-xlsr
  video_ssl_model_tag: dinov2-large

mask_policy: and_core
core_audio: [mel_mfcc, ssl_embed]
core_video: [vision_ssl_embed, qc_stats]

# 架构参数 (基于AdoDAS 2026技术指南)
d_adapter: 64
d_model: 512
tcn_layers: 6
tcn_kernel_size: 3
asp_alpha: 0.5
asp_beta: 0.5
dropout: 0.2
d_shared: 512

# 层级化Transformer配置
use_hierarchical_encoder: true
n_unimodal_layers: 4
n_fusion_layers: 2
n_bottleneck_tokens: 4
n_perceiver_queries: 32
temporal_stride: 4

# 聚合器配置
aggregator: attention

# 训练参数 (基于AdoDAS 2026技术指南优化)
batch_size: 64
lr: 3e-5
weight_decay: 0.01
warmup_ratio: 0.06
warmup_epochs: 2
epochs: 30
seed: 42
num_workers: 8
amp: true
preload: true
grad_clip: 1.0
grad_accumulation: 4
use_pos_weight: true
patience: 8

# 损失函数配置 (ASL + 软F1组合)
use_combined_loss: true
gamma_neg: 2
gamma_pos: 0
asl_clip: 0.05
soft_f1_weight: 0.3
label_smoothing: 0.1

# 会话损失权重
session_loss_weight: 0.2
session_type_loss_weight: 0.15

# 数据增强
feature_noise_std: 0.01
feature_mask_prob: 0.1
mixup_alpha: 0.2
session_drop_prob: 0.1

# 提交配置
submission_level: participant
decode_method: auto
early_stop_metric: primary
