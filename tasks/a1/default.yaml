feature_root: /data1/AdoDas
manifest_dir: /data1/AdoDas
output_dir: /data1/AdoDas/output

feature_selection:
  audio_features:
    - mel_mfcc
    - vad
    - egemaps
    - ssl_embed
  video_features:
    - headpose_geom
    - face_behavior
    - qc_stats
    - vad_agg
    # - body_pose
    # - global_motion
    - vision_ssl_embed
  audio_ssl_model_tag: wav2vec2-chinese-xlsr
  video_ssl_model_tag: dinov2-large

mask_policy: and_core
core_audio: [mel_mfcc, ssl_embed]
core_video: [vision_ssl_embed, qc_stats]

d_adapter: 64
d_model: 256
tcn_layers: 6
tcn_kernel_size: 3
asp_alpha: 0.5
asp_beta: 0.5
dropout: 0.2
d_shared: 256

aggregator: mlp
use_aux_attrs: true
aux_embed_dim: 8
batch_size: 64
lr: 0.001
weight_decay: 0.01
warmup_epochs: 1
epochs: 30
seed: 42
num_workers: 8
amp: true
preload: true
grad_clip: 1.0
use_pos_weight: true
patience: 6
session_loss_weight: 0.2
session_type_loss_weight: 0.15
submission_level: participant
decode_method: auto
label_smoothing: 0.0
feature_noise_std: 0.0
session_drop_prob: 0.0
early_stop_metric: primary

# LUPI: Learning Using Privileged Information
# 辅助属性仅在训练集可用，测试时不可用。通过多任务监督利用辅助属性提升泛化。
aux_lupi:
  enabled: false            # 总开关，false 时回退到 baseline 行为
  phase1_mtl:
    enabled: false          # Phase 1: 从 participant_repr 预测 5 个辅助属性
    hidden: 64
    weights:
      aux_family: 0.05
      aux_only_child: 0.05
      aux_favoritism: 0.05
      aux_academic: 0.15
      aux_emotional: 0.20
  phase2_reweight:
    enabled: false          # Phase 2: 基于 aux_emotional 一致性做样本加权
    method: emotional_consistency
    weight_low: 0.7         # 冲突样本权重（可能错标）
    weight_high: 1.2        # 一致样本权重
  phase3_kd:
    enabled: false
  phase4_dro:
    enabled: false
